<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f6f8fb" />
  <title>ARSLAN PEDIDOS 15%</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar glass">
      <div class="brand-wrap">
        <div>
          <h1>ARSLAN PEDIDOS 15%</h1>
          <p>Pedidos · Proveedor · Externos · Cobros</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-soft" id="themeToggleBtn" type="button">Modo nocturno</button>
          <button class="btn btn-soft" id="backupBtn" type="button">Backup</button>
          <button class="btn btn-soft" id="restoreBtn" type="button">Restaurar</button>
          <button class="btn btn-danger" id="clearDayTopBtn" type="button">Limpiar día</button>
        </div>
      </div>
      <section class="stats-grid" id="dashboardStats"></section>
    </header>

    <main class="views-wrap">
      <section class="view active" id="view-dashboard"></section>
      <section class="view" id="view-clients"></section>
      <section class="view" id="view-orders"></section>
      <section class="view" id="view-provider"></section>
      <section class="view" id="view-payments"></section>
      <section class="view" id="view-history"></section>
      <section class="view" id="view-settings"></section>
    </main>
  </div>

  <nav class="bottom-nav glass">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" data-view="dashboard" type="button">
        <span class="nav-icon">⌂</span>
        <span>Inicio</span>
      </button>
      <button class="nav-btn" data-view="clients" type="button">
        <span class="nav-icon">👥</span>
        <span>Clientes</span>
      </button>
      <button class="nav-btn" data-view="orders" type="button">
        <span class="nav-icon">🧾</span>
        <span>Pedidos</span>
      </button>
      <button class="nav-btn" data-view="provider" type="button">
        <span class="nav-icon">📦</span>
        <span>Proveedor</span>
      </button>
      <button class="nav-btn" data-view="payments" type="button">
        <span class="nav-icon">€</span>
        <span>Cobros</span>
      </button>
    </div>
  </nav>

  <input id="restoreInput" type="file" accept="application/json" hidden />
  <script src="app.js"></script>
</body>
</html>
